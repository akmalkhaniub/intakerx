<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic EHR Portal - Mock</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      padding: 40px;
      color: #1f2937;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    h2 {
      margin-top: 0;
      color: #111827;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    button {
      background-color: #2563eb;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .success-box {
      display: none;
      background-color: #def7ec;
      color: #03543f;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
  <script>
    function submitForm(event) {
      event.preventDefault();
      document.getElementById('ehr-form').style.display = 'none';
      const randomEhrId = 'EHR-' + Math.floor(100000 + Math.random() * 900000);
      document.getElementById('ehr-id-display').innerText = randomEhrId;
      document.getElementById('success-message').style.display = 'block';
    }
  </script>
</head>
<body>
  <div class="container">
    <h2>EHR Portal - Patient Record Ingestion</h2>
    <form id="ehr-form" onsubmit="submitForm(event)">
      <div class="form-group">
        <label for="patientName">Patient Name</label>
        <input type="text" id="patientName" required>
      </div>
      <div class="form-group">
        <label for="chiefComplaint">Chief Complaint</label>
        <input type="text" id="chiefComplaint" required>
      </div>
      <div class="form-group">
        <label for="hpi">History of Present Illness (HPI)</label>
        <textarea id="hpi" required></textarea>
      </div>
      <div class="form-group">
        <label for="triageLevel">Triage Level</label>
        <select id="triageLevel" required>
          <option value="routine">Routine</option>
          <option value="urgent">Urgent</option>
          <option value="emergency">Emergency</option>
        </select>
      </div>
      <div class="form-group">
        <label for="medications">Active Medications</label>
        <input type="text" id="medications">
      </div>
      <div class="form-group">
        <label for="allergies">Allergies</label>
        <input type="text" id="allergies">
      </div>
      <button type="submit" id="submit-btn">Ingest into Patient Chart</button>
    </form>
    
    <div id="success-message" class="success-box">
      Patient chart successfully created! EHR Record ID: <span id="ehr-id-display"></span>
    </div>
  </div>
</body>
</html>
